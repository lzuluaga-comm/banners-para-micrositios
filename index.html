<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Generador de Banners Bonda</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,sans-serif;background:#f1f5f9;min-height:100vh;color:#1f2937}
.sp::-webkit-scrollbar{width:4px}.sp::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
input[type=range]{width:100%;height:4px;appearance:none;background:#e5e7eb;border-radius:4px;cursor:pointer;accent-color:#2563eb;outline:none}
input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:#2563eb;cursor:pointer}
.tinp{width:100%;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;color:#111;background:#fff;outline:none;font-family:inherit}
.sinp{width:100%;padding:6px 8px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;background:#f9fafb;outline:none;color:#111}
.lbl{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px;margin-top:8px;display:block}
.sh{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:block}
.tabbar{display:flex;gap:3px;background:#f3f4f6;border-radius:8px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:5px 4px;font-size:11px;font-weight:700;border:none;cursor:pointer;border-radius:6px;background:transparent;color:#9ca3af;transition:all .15s}
.tab.on{background:#fff;color:#2563eb;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.boldbtn{padding:3px 10px;font-size:13px;font-weight:900;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;background:#f9fafb;color:#6b7280;font-family:serif;line-height:1.4;flex-shrink:0}
.boldbtn.on{background:#1e40af;color:#fff;border-color:#1e40af}
.alignbtn{padding:3px 8px;font-size:13px;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;background:#f9fafb;color:#6b7280;line-height:1.4;flex-shrink:0}
.alignbtn.on{background:#1e40af;color:#fff;border-color:#1e40af}
.viewbtn{padding:6px 16px;font-size:12px;font-weight:700;border:none;cursor:pointer;border-radius:7px;background:transparent;color:#9ca3af;transition:all .15s}
.viewbtn.on{background:#fff;color:#2563eb;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #e5e7eb;flex-shrink:0;transition:all .15s}
.sw.on{border:3px solid #2563eb;box-shadow:0 0 0 2px #bfdbfe}
.bel{position:absolute;cursor:move;user-select:none;z-index:50}
.bel .tip{display:none;position:absolute;bottom:calc(100% + 4px);left:0;background:rgba(30,58,138,.9);color:#fff;font-size:9px;padding:2px 8px;border-radius:4px;white-space:nowrap;z-index:100;font-weight:700;pointer-events:none;font-family:ui-sans-serif,sans-serif}
.bel:hover .tip{display:block}
.bel.sel{outline:2px dashed rgba(37,99,235,.6);outline-offset:2px;border-radius:3px}
.pbg{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45)}
.pbox{background:#fff;border-radius:16px;padding:22px 26px;min-width:280px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.editbar{display:flex;background:#f3f4f6;border-radius:8px;padding:3px;gap:3px;margin-bottom:16px}
.editbtn{flex:1;padding:7px 10px;font-size:12px;font-weight:700;border:none;cursor:pointer;border-radius:6px;background:transparent;color:#9ca3af;transition:all .15s}
.editbtn.on{background:#2563eb;color:#fff;box-shadow:0 1px 4px rgba(37,99,235,.4)}
/* Multicolor segment input */
.seg-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;background:#f8fafc;border-radius:8px;padding:6px 8px}
.seg-text{flex:1;padding:5px 8px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;outline:none;font-family:inherit}
.seg-color{width:28px;height:28px;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;padding:2px;flex-shrink:0}
.seg-del{width:22px;height:22px;border-radius:50%;background:#fee2e2;color:#dc2626;border:none;cursor:pointer;font-size:14px;line-height:1;font-weight:700;flex-shrink:0}
.seg-add{width:100%;padding:6px;background:#eff6ff;color:#2563eb;border:1px dashed #bfdbfe;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px}
/* Download hide elements */
.hide-on-dl{transition:opacity .1s}
</style>
</head>

// ── CLIPS & EDGE ──────────────────────────────────────────────────────────────
function getClip(fmt){
  const c=C(fmt);
  const a=c.diagAngle!==undefined?c.diagAngle:20; // cutback %
  if(c.clipStyle==='straight'){
    return c.textSide==='right'?'polygon(0 0,100% 0,100% 100%,0 100%)':'polygon(0 0,100% 0,100% 100%,0 100%)';
  }
  if(c.textSide==='right'){
    if(c.clipStyle==='diagonal-right') return `polygon(${a}% 0,100% 0,100% 100%,0 100%)`;
    return `polygon(0 0,100% 0,100% 100%,${a}% 100%)`;
  } else {
    if(c.clipStyle==='diagonal-right') return `polygon(0 0,100% 0,${100-a}% 100%,0 100%)`;
    return `polygon(0 0,${100-a}% 0,100% 100%,0 100%)`;
  }
}
function getEdge(fmt){
  const c=C(fmt); if(c.edgeEffect==='none')return'none';
  const s=c.textSide==='left'?1:-1;
  return({shadow:`drop-shadow(${s*8}px 0 12px rgba(0,0,0,.5))`,glow:`drop-shadow(${s*2}px 0 10px rgba(255,255,255,.6))`,'solid-white':`drop-shadow(${s*4}px 0 0 #fff)`})[c.edgeEffect]||'none';
}

// ── DRAG ─────────────────────────────────────────────────────────────────────
let _drag=null;
function startDrag(e,elId,fmt){
  const isT=e.type==='touchstart';if(!isT&&e.button!==0)return;
  e.preventDefault();e.stopPropagation();
  const cx=isT?e.touches[0].clientX:e.clientX;
  const cy=isT?e.touches[0].clientY:e.clientY;
  const bw=$('bw-'+fmt);if(!bw)return;
  const rect=bw.getBoundingClientRect();
  const cur=C(fmt).pos[elId];
  document.querySelectorAll('.bel').forEach(d=>d.classList.remove('sel'));
  $('be-'+fmt+'-'+elId)?.classList.add('sel');
  _drag={elId,fmt,sx:100/rect.width,sy:100/rect.height,cx,cy,px:cur.xp,py:cur.yp};
}
function onMv(e){
  if(!_drag)return;
  const isT=e.type==='touchmove';if(isT)e.preventDefault();
  const cx=isT?e.touches[0].clientX:e.clientX;
  const cy=isT?e.touches[0].clientY:e.clientY;
  const nx=_drag.px+(cx-_drag.cx)*_drag.sx;
  const ny=_drag.py+(cy-_drag.cy)*_drag.sy;
  // Clamp so elements don't go too far off-screen
  const nxp=Math.max(-30,Math.min(120,nx));
  const nyp=Math.max(-10,Math.min(110,ny));
  C(_drag.fmt).pos[_drag.elId]={xp:nxp,yp:nyp};
  const el=$('be-'+_drag.fmt+'-'+_drag.elId);
  if(el){el.style.left=nxp+'%';el.style.top=nyp+'%';}
}
function onUp(){_drag=null;}
document.addEventListener('mousemove',onMv);
document.addEventListener('mouseup',onUp);
document.addEventListener('touchmove',onMv,{passive:false});
document.addEventListener('touchend',onUp);

  rng.oninput=()=>{E()[key]=+rng.value;vs.textContent=rng.value+'px';reBanner();};
  const dr=mk('div');css(dr,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px',fontSize:'12px',color:'#6b7280'});

// ── RENDER TEXT WITH SEGMENTS (multicolor inline) ─────────────────────────────
function renderSegText(segs, baseStyle){
  const wrap=mk('div');
  Object.assign(wrap.style, baseStyle);
  wrap.style.display='flex';
  wrap.style.flexWrap='wrap';
  wrap.style.alignItems='baseline';
  segs.forEach(seg=>{
    if(!seg.text) return;
    const span=mk('span');
    Object.assign(span.style, baseStyle);
    span.style.color=seg.color;
    span.style.display='inline';
    span.textContent=seg.text;
    wrap.appendChild(span);
  });
  return wrap;
}

// ── BUILD BANNER BACKGROUND ───────────────────────────────────────────────────
function buildBg(fmt){
  const c=C(fmt);
  const bg=mk('div');bg.id='bb-'+fmt;css(bg,{position:'absolute',inset:'0',overflow:'hidden'});
  if(c.bgImg){
    const img=mk('img');img.src=c.bgImg;
    css(img,{position:'absolute',maxWidth:'none',width:(c.zoom*100)+'%',height:'auto',
      left:c.posX+'%',top:c.posY+'%',transform:'translate(-50%,-50%)',display:'block'});
    bg.appendChild(img);
  }
  const pw=(c.panelW||63)+'%';
  const po=mk('div');css(po,{position:'absolute',top:'0',height:'100%',width:pw,[c.textSide==='left'?'left':'right']:'0',filter:getEdge(fmt)});
  const pi=mk('div');css(pi,{width:'100%',height:'100%',clipPath:getClip(fmt),background:c.useGrad?`linear-gradient(to right,${c.colorA},${c.colorB})`:c.colorA});
  po.appendChild(pi);bg.appendChild(po);
  return bg;
}

// ── BUILD BANNER ELEMENTS ─────────────────────────────────────────────────────
function buildElems(fmt,wrapper){
  ['titulo','desc','logos','cta'].forEach(id=>{$('be-'+fmt+'-'+id)?.remove();});
  const c=C(fmt);

  function bel(elId,tipTxt,content){
    const p=c.pos[elId];
    const d=mk('div');d.className='bel';d.id='be-'+fmt+'-'+elId;
    css(d,{left:p.xp+'%',top:p.yp+'%'});
    const tip=mk('div');tip.className='tip';tip.textContent=tipTxt+' · doble clic = tamaño';
    d.appendChild(tip);d.appendChild(content);
    d.addEventListener('mousedown',e=>startDrag(e,elId,fmt));
    d.addEventListener('touchstart',e=>startDrag(e,elId,fmt),{passive:false});
    wrapper.appendChild(d);
    return d;
  }

  // ── TÍTULO (multicolor segments)
  const td=mk('div');css(td,{textAlign:c.line1Align||'left'});
  const baseL1={fontFamily:c.line1Font==='Moranga'?'Moranga,serif':'CerebriSans,sans-serif',
    fontSize:c.line1Size+'px',fontWeight:c.line1Bold?'700':'300',lineHeight:'1.1',
    textShadow:c.line1Bold?'0.5px 0 0 currentColor,-0.5px 0 0 currentColor':''};
  const l1=renderSegText(c.line1Segs,baseL1);
  l1.style.justifyContent=c.line1Align==='center'?'center':c.line1Align==='right'?'flex-end':'flex-start';
  const baseL2={fontFamily:c.line2Font==='Moranga'?'Moranga,serif':'CerebriSans,sans-serif',
    fontSize:c.line2Size+'px',fontStyle:'italic',fontWeight:c.line2Bold?'700':'400',lineHeight:'1.15',
    marginTop:'3px',textShadow:c.line2Bold?'0.5px 0 0 currentColor,-0.5px 0 0 currentColor':''};
  const l2=renderSegText(c.line2Segs,baseL2);
  l2.style.justifyContent=c.line2Align==='center'?'center':c.line2Align==='right'?'flex-end':'flex-start';
  td.appendChild(l1);td.appendChild(l2);
  const tEl=bel('titulo','Título',td);
  tEl.addEventListener('dblclick',e=>{e.stopPropagation();showSize('Línea 1','line1Size',10,100);});

  // ── DESCUENTO / PROMO
  if(c.mode!=='none'){
    let dd;
    if(c.mode==='porcentaje'){
      dd=mk('div');css(dd,{display:'flex',alignItems:'center',gap:'14px'});
      const nw=mk('div');css(nw,{display:'flex',alignItems:'flex-start'});
      const ns=mk('span');
      css(ns,{fontFamily:c.descFont==='Moranga'?'Moranga,serif':'CerebriSans,sans-serif',
        fontSize:c.descNumSize+'px',fontWeight:c.descBold?'900':'700',
        letterSpacing:'-0.03em',lineHeight:'1',color:c.descNumColor,
        textShadow:c.descBold?'0.5px 0 0 currentColor,-0.5px 0 0 currentColor':''});
      ns.textContent=c.descNum;nw.appendChild(ns);
      if(c.showOff){
        const od=mk('div');css(od,{display:'flex',flexDirection:'column',marginLeft:'4px',height:c.descNumSize+'px',justifyContent:'center'});
        const pct=mk('span');css(pct,{fontWeight:c.descBold?'900':'700',fontSize:(c.descNumSize*.27)+'px',lineHeight:'1',color:c.descNumColor});pct.textContent='%';
        const off=mk('span');css(off,{fontWeight:c.descBold?'900':'700',fontSize:(c.descNumSize*.13)+'px',marginTop:'3px',letterSpacing:'.1em',color:c.descNumColor});off.textContent='OFF';
        od.appendChild(pct);od.appendChild(off);nw.appendChild(od);
      }
      dd.appendChild(nw);
      const sep=mk('div');css(sep,{borderLeft:'2px solid rgba(255,255,255,.3)',paddingLeft:'14px',
        display:'flex',flexDirection:'column',justifyContent:'center',minHeight:c.descNumSize+'px',
        textAlign:c.descSubAlign||'left'});
      c.descSub.split('\n').forEach(line=>{
        const s=mk('span');
        css(s,{fontFamily:c.descFont==='Moranga'?'Moranga,serif':'CerebriSans,sans-serif',

        s.textContent=line;sep.appendChild(s);
      });
      dd.appendChild(sep);
    } else {
      dd=mk('div');
      css(dd,{background:c.promoBg,borderRadius:'12px',
        padding:(c.promoSize*.4)+'px '+(c.promoSize*.9)+'px',
        display:'inline-flex',flexDirection:'column',alignItems:'center',
        boxShadow:'0 4px 20px rgba(0,0,0,.3)'});
      c.promoText.split('\n').forEach(line=>{
        const dv=mk('div');
        css(dv,{fontFamily:c.promoFont==='Moranga'?'Moranga,serif':'CerebriSans,sans-serif',
          fontSize:c.promoSize+'px',fontWeight:c.promoBold?'700':'500',

        dv.style.textAlign=c.promoAlign||'center';
        dv.textContent=line;dd.appendChild(dv);
      });
    }
    const dEl=bel('desc',c.mode==='promo'?'Promo':'Descuento',dd);

    });

  // ── LOGOS — template-based group (1, 2, 4 or 6 logos)
  {
    const n = c.logoCount || 1;
    const sz = c.logoSize;
    const gap = c.logoGap || 10;
    // Layout offsets per template
    const layouts = {
      1: [[0,0]],
      2: [[0,0],[sz+gap,0]],
      4: [[0,0],[sz+gap,0],[0,sz+gap],[sz+gap,sz+gap]],
      6: [[0,0],[sz+gap,0],[sz*2+gap*2,0],[0,sz+gap],[sz+gap,sz+gap],[sz*2+gap*2,sz+gap]]
    };
    const offsets = layouts[n] || layouts[1];
    const group = mk('div'); css(group,{position:'relative'});
    // compute group bounding box
    const gw = offsets.reduce((m,o)=>Math.max(m,o[0]+sz),0);

    });

    lEl.addEventListener('dblclick',e=>{e.stopPropagation();showSize('Tamaño logos','logoSize',30,220);});
  }

  // ── CTA
  const cb=mk('div');
  css(cb,{background:c.ctaColor,color:c.ctaTextColor||'#fff',borderRadius:'999px',
    padding:(c.ctaSize*.65)+'px '+(c.ctaSize*2.2)+'px',

    boxShadow:'0 4px 16px rgba(0,0,0,.3)',whiteSpace:'nowrap',
    fontFamily:c.ctaFont==='Moranga'?'Moranga,serif':'CerebriSans,sans-serif',

  const cEl=bel('cta','Botón CTA',cb);
  cEl.addEventListener('dblclick',e=>{e.stopPropagation();showSize('Tamaño botón','ctaSize',8,36);});
}

// ── BUILD BANNER WRAPPER ──────────────────────────────────────────────────────
function buildBanner(fmt){
  const isMob=fmt==='mobile';const BW=isMob?984:1000,BH=isMob?450:300;
  const w=mk('div');w.id='bw-'+fmt;css(w,{position:'relative',width:'100%',aspectRatio:BW+'/'+BH});
  w.appendChild(buildBg(fmt));buildElems(fmt,w);return w;
}

// ── DOWNLOAD (high quality, no UI artifacts) ──────────────────────────────────
async function dlBanner(fmt){
  const btn=$('dl-'+fmt);
  if(btn){btn.textContent='Procesando...';btn.disabled=true;}

  const isMob = fmt==='mobile';
  const BW = isMob ? 984 : 1000;
  const BH = isMob ? 450 : 300;
  const OW = BW*3, OH = BH*3; // 3x output

  try{
    const c = C(fmt);
    await document.fonts.ready;
    await new Promise(r=>requestAnimationFrame(r));

    const wrap = $('bw-'+fmt);
    const rect = wrap.getBoundingClientRect();
    const dispW = rect.width;
    const dispH = rect.height;
    // Scale factor: font sizes were set visually at dispW wide.
    // To look the same proportionally at BW wide, multiply by this factor.
    const FS = BW / dispW; // font scale

    const out = document.createElement('canvas');
    out.width = OW; out.height = OH;
    const ctx = out.getContext('2d');
    ctx.scale(3,3); // draw in BW×BH space, output at 3x

    // Fill entire canvas with base color first (no black/transparent areas)
    if(c.useGrad){
      const gFull=ctx.createLinearGradient(0,0,BW,0);
      gFull.addColorStop(0,c.colorA); gFull.addColorStop(1,c.colorB);
      ctx.fillStyle=gFull;
    } else { ctx.fillStyle=c.colorA; }
    ctx.fillRect(0,0,BW,BH);

    // ── 1. BACKGROUND IMAGE ─────────────────────────────────────────────────
    if(c.bgImg){
      await new Promise(res=>{
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=()=>{
          const cssW = c.zoom * BW;
          const cssH = img.naturalHeight * (cssW / img.naturalWidth);
          const cx = c.posX/100*BW;
          const cy = c.posY/100*BH;
          ctx.drawImage(img, cx-cssW/2, cy-cssH/2, cssW, cssH);
          res();
        };
        img.onerror=res; img.src=c.bgImg;
      });
    }

    // ── 2. COLOR PANEL WITH DIAGONAL CLIP ───────────────────────────────────
    const pw = (c.panelW||63)/100 * BW;
    const isR = c.textSide==='right';

    // Gradient spans the panel width
    const _gradEnd = c.textSide==='right' ? BW : pw;
    const _gradStart = c.textSide==='right' ? BW-pw : 0;
    const bgFill = c.useGrad
      ? (()=>{ const g=ctx.createLinearGradient(_gradStart,0,_gradEnd,0); g.addColorStop(0,c.colorA); g.addColorStop(1,c.colorB); return g; })()
      : c.colorA;

    // Build clip polygon matching CSS clip-path exactly
    ctx.save();
    const da = (c.diagAngle!==undefined ? c.diagAngle : 20) / 100;
    ctx.beginPath();
    if(!isR){
      if(c.clipStyle==='diagonal-right'){
        ctx.moveTo(0,0); ctx.lineTo(pw,0); ctx.lineTo(pw*(1-da),BH); ctx.lineTo(0,BH);
      } else if(c.clipStyle==='diagonal-left'){
        ctx.moveTo(0,0); ctx.lineTo(pw*(1-da),0); ctx.lineTo(pw,BH); ctx.lineTo(0,BH);
      } else {
        ctx.rect(0,0,pw,BH);
      }
    } else {
      const x0 = BW-pw;
      if(c.clipStyle==='diagonal-right'){
        ctx.moveTo(x0+pw*da,0); ctx.lineTo(BW,0); ctx.lineTo(BW,BH); ctx.lineTo(x0,BH);
      } else if(c.clipStyle==='diagonal-left'){
        ctx.moveTo(x0,0); ctx.lineTo(BW,0); ctx.lineTo(BW,BH); ctx.lineTo(x0+pw*da,BH);
      } else {
        ctx.rect(x0,0,pw,BH);
      }
    }
    ctx.closePath();
    ctx.fillStyle = bgFill;
    ctx.fill();

    // ── Edge effects ──────────────────────────────────────────────────────────
    if(c.edgeEffect !== 'none'){
      // Build same polygon path
      function edgePath(){
        ctx.beginPath();
        if(!isR){
          if(c.clipStyle==='diagonal-right'){ctx.moveTo(0,0);ctx.lineTo(pw,0);ctx.lineTo(pw*(1-da),BH);ctx.lineTo(0,BH);}
          else if(c.clipStyle==='diagonal-left'){ctx.moveTo(0,0);ctx.lineTo(pw*(1-da),0);ctx.lineTo(pw,BH);ctx.lineTo(0,BH);}
          else{ctx.rect(0,0,pw,BH);}
        } else {
          const x0=BW-pw;
          if(c.clipStyle==='diagonal-right'){ctx.moveTo(x0+pw*da,0);ctx.lineTo(BW,0);ctx.lineTo(BW,BH);ctx.lineTo(x0,BH);}
          else if(c.clipStyle==='diagonal-left'){ctx.moveTo(x0,0);ctx.lineTo(BW,0);ctx.lineTo(BW,BH);ctx.lineTo(x0+pw*da,BH);}
          else{ctx.rect(x0,0,pw,BH);}
        }
        ctx.closePath();
      }

      if(c.edgeEffect==='solid-white'){
        // Draw white line along the diagonal edge
        ctx.save();
        ctx.beginPath();
        if(!isR){
          if(c.clipStyle==='diagonal-right'){ctx.moveTo(pw,0);ctx.lineTo(pw*(1-da),BH);}
          else if(c.clipStyle==='diagonal-left'){ctx.moveTo(pw*(1-da),0);ctx.lineTo(pw,BH);}
          else{ctx.moveTo(pw,0);ctx.lineTo(pw,BH);}
        } else {
          const x0=BW-pw;
          if(c.clipStyle==='diagonal-right'){ctx.moveTo(x0+pw*da,0);ctx.lineTo(x0,BH);}
          else if(c.clipStyle==='diagonal-left'){ctx.moveTo(x0,0);ctx.lineTo(x0+pw*da,BH);}
          else{ctx.moveTo(x0,0);ctx.lineTo(x0,BH);}
        }
        ctx.strokeStyle='rgba(255,255,255,0.9)';
        ctx.lineWidth=4;
        ctx.stroke();
        ctx.restore();

      } else if(c.edgeEffect==='shadow' || c.edgeEffect==='glow'){
        // Draw the panel shape AGAIN with shadow, then overdraw with no-shadow version
        // This produces the shadow effect on the edge without affecting the fill
        const shadowColor = c.edgeEffect==='shadow'
          ? 'rgba(0,0,0,0.65)'
          : 'rgba(255,255,255,0.75)';
        const offsetDir = isR ? -1 : 1;

        // Pass 1: filled panel with shadow
        ctx.save();
        ctx.shadowColor   = shadowColor;
        ctx.shadowBlur    = 22;
        ctx.shadowOffsetX = offsetDir * 12;
        ctx.shadowOffsetY = 0;
        edgePath();
        ctx.fillStyle = bgFill;
        ctx.fill();
        ctx.restore();

        // Pass 2: redraw panel WITHOUT shadow to restore clean fill
        ctx.save();
        ctx.shadowColor = 'transparent';
        edgePath();
        ctx.fillStyle = bgFill;
        ctx.fill();
        ctx.restore();
      }
    }

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function fontStr(font,size,bold,italic){
      return `${italic?'italic ':''} ${bold?'700':'300'} ${size}px "${font==='Moranga'?'Moranga':'CerebriSans"'}`;
    }
    function drawSegs(segs, x, y, size, font, bold, italic, align){
      ctx.save();
      ctx.font=fontStr(font,size,bold,italic);
      ctx.textBaseline='top';
      let totalW=0;
      segs.forEach(s=>{if(s.text) totalW+=ctx.measureText(s.text).width;});
      let ox = x; // position comes from drag; alignment only affects HTML preview
      segs.forEach(seg=>{
        if(!seg.text) return;
        ctx.fillStyle=seg.color;
        if(bold){ ctx.fillText(seg.text,ox+0.4,y); ctx.fillText(seg.text,ox-0.4,y); }
        ctx.fillText(seg.text,ox,y);
        ox+=ctx.measureText(seg.text).width;
      });
      ctx.restore();
      return totalW;
    }
    function roundRect(x,y,w,h,r,fill){
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
      ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
      ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
      ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
      ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
      ctx.restore();
    }

    // ── 3. TITLE ─────────────────────────────────────────────────────────────
    {
      const p=c.pos['titulo'];
      const x=p.xp/100*BW, y=p.yp/100*BH;
      const sz1=c.line1Size*FS, sz2=c.line2Size*FS;
      const lh1 = sz1*1.1 + 3*FS;
      const ff1 = c.line1Font==='Moranga'?'Moranga':'CerebriSans';
      const ff2 = c.line2Font==='Moranga'?'Moranga':'CerebriSans';

      // Measure widths for alignment
      ctx.save();
      ctx.font=(c.line1Bold?'700 ':'300 ')+sz1+'px "'+ff1+'"';
      let w1=0; c.line1Segs.forEach(s=>{if(s.text)w1+=ctx.measureText(s.text).width;});
      ctx.font='italic '+(c.line2Bold?'700 ':'400 ')+sz2+'px "'+ff2+'"';
      let w2=0; c.line2Segs.forEach(s=>{if(s.text)w2+=ctx.measureText(s.text).width;});
      ctx.restore();

      drawSegs(c.line1Segs, x, y, sz1, c.line1Font, c.line1Bold, false, 'left');

      const a2=c.line2Align||'left';
      const x2 = a2==='center' ? x+(w1-w2)/2 : a2==='right' ? x+w1-w2 : x;
      drawSegs(c.line2Segs, x2, y+lh1, sz2, c.line2Font, c.line2Bold, true, 'left');
    }


    // ── 4. DESCUENTO / PROMO ─────────────────────────────────────────────────
    if(c.mode!=='none'){
      const p=c.pos['desc'];
      const x=p.xp/100*BW, y=p.yp/100*BH;
      const ff = c.descFont==='Moranga'?'Moranga':'CerebriSans';
      const fw = c.descBold?'900':'700';
      if(c.mode==='porcentaje'){
        const dNS=c.descNumSize*FS, dSS=c.descSubSize*FS;
      ctx.save();
        ctx.font=`${fw} ${dNS}px "${ff}"`;
        ctx.textBaseline='top';
        ctx.fillStyle=c.descNumColor;
        if(c.descBold){ctx.fillText(c.descNum,x+0.4,y);ctx.fillText(c.descNum,x-0.4,y);}
        ctx.fillText(c.descNum,x,y);
        const numW=ctx.measureText(c.descNum).width;
        if(c.showOff){
          const pctSz=dNS*0.27, offSz=dNS*0.13;
          const stackH = pctSz + 3 + offSz;
          const stackY = y + (dNS - stackH) / 2;
          ctx.font=`${fw} ${pctSz}px "${ff}"`;
          ctx.fillText('%', x+numW+4, stackY);
          ctx.font=`${fw} ${offSz}px "${ff}"`;
          ctx.fillText('OFF', x+numW+4, stackY+pctSz+3);
        }
        const sepX=x+numW+(c.showOff?dNS*0.32:6)+6;
        // Separator line — full height of number block
        ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=2*FS;
        ctx.beginPath(); ctx.moveTo(sepX,y); ctx.lineTo(sepX,y+dNS); ctx.stroke();
        // Subtext: vertically centered against number height
        ctx.font=`500 ${dSS}px "${ff}"`;
        const subLines=c.descSub.split('\n');
        const lineH=dSS*1.3;
        const totalSubH=subLines.length*lineH;
        const subStartY=y+(dNS-totalSubH)/2;
        ctx.textAlign = (c.descSubAlign||'left')==='center'?'center':(c.descSubAlign==='right'?'right':'left');
        subLines.forEach((ln,i)=>{
          ctx.fillStyle=c.descSubColor;
          ctx.fillText(ln, sepX+12*FS, subStartY+i*lineH);
        });
        ctx.textAlign='left';
        ctx.restore();
      } else {
        const pf=c.promoFont==='Moranga'?'Moranga':'CerebriSans';
        const pSZ=c.promoSize*FS;
        ctx.save();
        ctx.font=`${c.promoBold?'700':'500'} ${pSZ}px "${pf}"`;
        ctx.textBaseline='top';
        const lines=c.promoText.split('\n');
        let maxW=0; lines.forEach(l=>{const w=ctx.measureText(l).width;if(w>maxW)maxW=w;});
        const padX=pSZ*0.9, padY=pSZ*0.4;
        const bw2=maxW+padX*2, bh2=lines.length*pSZ*1.3+padY*2;
        roundRect(x,y,bw2,bh2,12*FS,c.promoBg);
        ctx.fillStyle=c.promoColor;
        lines.forEach((ln,i)=>{
          const lw=ctx.measureText(ln).width;
          ctx.fillText(ln,x+(bw2-lw)/2,y+padY+i*pSZ*1.3);
        });
        ctx.restore();
      }
    }

    // ── 5. LOGOS — template layout ────────────────────────────────────────────
    {
      const n=c.logoCount||1;
      const sz=c.logoSize*FS, gap=(c.logoGap||10)*FS, pad=6*FS, r=14*FS;
      const layouts={
        1:[[0,0]],
        2:[[0,0],[sz+gap,0]],
        4:[[0,0],[sz+gap,0],[0,sz+gap],[sz+gap,sz+gap]],
        6:[[0,0],[sz+gap,0],[sz*2+gap*2,0],[0,sz+gap],[sz+gap,sz+gap],[sz*2+gap*2,sz+gap]]
      };
      const offsets=layouts[n]||layouts[1];
      const gp=c.pos['logos'];
      const gx=gp.xp/100*BW, gy=gp.yp/100*BH;
      // Draw logos sequentially (not concurrent) to avoid async ctx state corruption
      for(let i=0;i<offsets.length;i++){
        const src=c.logos[i]; if(!src) continue;
        const ox=offsets[i][0], oy=offsets[i][1];
        const lx=gx+ox, ly=gy+oy;
        await new Promise(res=>{
          const img=new Image(); img.crossOrigin='anonymous';
          img.onload=()=>{
            // Draw white box with shadow
            ctx.save();
            ctx.shadowColor='rgba(0,0,0,.22)'; ctx.shadowBlur=12; ctx.shadowOffsetY=3;
            ctx.fillStyle='#fff';
            ctx.beginPath();
            ctx.moveTo(lx+r,ly); ctx.lineTo(lx+sz-r,ly);
            ctx.arcTo(lx+sz,ly,lx+sz,ly+r,r); ctx.lineTo(lx+sz,ly+sz-r);
            ctx.arcTo(lx+sz,ly+sz,lx+sz-r,ly+sz,r); ctx.lineTo(lx+r,ly+sz);
            ctx.arcTo(lx,ly+sz,lx,ly+sz-r,r); ctx.lineTo(lx,ly+r);
            ctx.arcTo(lx,ly,lx+r,ly,r); ctx.closePath(); ctx.fill();
            ctx.restore();
            // Draw logo on offscreen canvas at SCALE x resolution, then stamp
            const SCALE=3;
            const tsz=Math.ceil(sz*SCALE);
            const tmp=document.createElement('canvas');
            tmp.width=tsz; tmp.height=tsz;
            const tc=tmp.getContext('2d');
            const tr=r*SCALE, tpad=pad*SCALE;
            tc.beginPath();
            tc.moveTo(tr,0); tc.lineTo(tsz-tr,0); tc.arcTo(tsz,0,tsz,tr,tr);
            tc.lineTo(tsz,tsz-tr); tc.arcTo(tsz,tsz,tsz-tr,tsz,tr);
            tc.lineTo(tr,tsz); tc.arcTo(0,tsz,0,tsz-tr,tr);
            tc.lineTo(0,tr); tc.arcTo(0,0,tr,0,tr); tc.closePath(); tc.clip();
            tc.imageSmoothingEnabled=true; tc.imageSmoothingQuality='high';
            tc.drawImage(img,tpad,tpad,tsz-tpad*2,tsz-tpad*2);
            // Draw tmp into main canvas in scaled coordinate space
            ctx.drawImage(tmp, lx, ly, sz, sz);
            res();
          };
          img.onerror=res; img.src=src;
        });
      }
    }

    // ── 6. CTA BUTTON ─────────────────────────────────────────────────────────
    {
      const p=c.pos['cta'];
      const x=p.xp/100*BW, y=p.yp/100*BH;
      const ff=c.ctaFont==='Moranga'?'Moranga':'CerebriSans';
      const fw=c.ctaBold?'700':'400';
      const ctaSZ=c.ctaSize*FS;
      ctx.save();
      ctx.font=`${fw} ${ctaSZ}px "${ff}"`;
      ctx.textBaseline='middle';
      const tw=ctx.measureText(c.ctaText).width;
      const padX=ctaSZ*2.2, padY=ctaSZ*0.65;
      const bw2=tw+padX*2, bh2=ctaSZ+padY*2, r=bh2/2;
      ctx.shadowColor='rgba(0,0,0,.28)'; ctx.shadowBlur=10*FS; ctx.shadowOffsetY=2*FS;
      roundRect(x,y,bw2,bh2,r,c.ctaColor);
      ctx.restore();
      ctx.save();
      ctx.font=`${fw} ${ctaSZ}px "${ff}"`;
      ctx.textBaseline='middle'; ctx.fillStyle=c.ctaTextColor||'#fff'; ctx.textAlign='left';
      if(c.ctaBold){ctx.fillText(c.ctaText,x+padX+0.4,y+bh2/2);ctx.fillText(c.ctaText,x+padX-0.4,y+bh2/2);}
      ctx.fillText(c.ctaText,x+padX,y+bh2/2);
      ctx.restore();
    }

    // ── 7. DOWNLOAD — siempre JPG, calidad alta, bajo 2MB ───────────────────
    const MAX = 1.9 * 1024 * 1024;
    let q = 0.92, dataUrl;
    do {
      dataUrl = out.toDataURL('image/jpeg', q);
      const sz = (dataUrl.length - 'data:image/jpeg;base64,'.length) * 0.75;
      if(sz <= MAX) break;
      q -= 0.05;
    } while(q >= 0.4);

    const a = document.createElement('a');
    a.download = 'banner-bonda-' + fmt + '.jpg';
    a.href = dataUrl; a.click();

  } catch(err){
    alert('Error: '+err.message); console.error(err);
  }
  if(btn){btn.textContent='⬇ Descargar PNG'; btn.disabled=false;}
}


// ── IMAGE COMPRESSOR (max 2MB) ───────────────────────────────────────────────
async function compressImage(dataUrl, maxBytes=1.9*1024*1024){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth, h=img.naturalHeight;
      let q=0.92; // start quality
      const try1=()=>{
        const cvs=document.createElement('canvas');
        cvs.width=w; cvs.height=h;
        cvs.getContext('2d').drawImage(img,0,0,w,h);
        const out=cvs.toDataURL('image/jpeg',q);
        const bytes=(out.length-'data:image/jpeg;base64,'.length)*0.75;
        if(bytes<=maxBytes||q<0.1){res(out);return;}
        // try reducing quality first
        if(q>0.5){q-=0.1;try1();return;}
        // then reduce dimensions
        w=Math.round(w*0.85); h=Math.round(h*0.85); q=0.7;
        try1();
      };
      try1();
    };
    img.src=dataUrl;
  });
}

    alignBtns('line1Align')
  ));

  // Line 2
  left.appendChild(lbl('Línea 2 (cursiva) — segmentos de color'));
  left.appendChild(buildSegEditor('line2Segs'));
  left.appendChild(row(
    sinp([['Moranga','Moranga'],['CerebriSans','Cerebri Sans']],c().line2Font,v=>c().line2Font=v),
    bBtn('line2Bold'),
    alignBtns('line2Align')
  ));
  left.appendChild(rrw('Tamaño línea 2',10,100,1,c().line2Size,v=>c().line2Size=v));

  // 2. Descuento
  left.appendChild(divL());left.appendChild(sh('2','Descuento / PROMO'));
  left.appendChild(tabBar([['porcentaje','% OFF'],['promo','PROMO'],['none','Ninguno']],c().mode,v=>c().mode=v));
  if(c().mode==='porcentaje'){
    const nr=mk('div');css(nr,{display:'grid',gridTemplateColumns:'66px 1fr',gap:'8px',marginBottom:'8px'});
    nr.appendChild(tinp(c().descNum,v=>c().descNum=v,{textAlign:'center',fontWeight:'700',fontSize:'20px'}));
    const ta=mk('textarea');ta.value=c().descSub;ta.rows=2;ta.className='tinp';ta.style.resize='none';
    ta.oninput=e=>{c().descSub=e.target.value;reBanner();};nr.appendChild(ta);
    left.appendChild(nr);
    const cr=mk('div');css(cr,{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'});
    const ck=mk('input');ck.type='checkbox';ck.checked=c().showOff;ck.style.accentColor='#2563eb';
    ck.onchange=e=>{c().showOff=e.target.checked;reBanner();};
    const cl=mk('label');css(cl,{fontSize:'12px',fontWeight:'500',cursor:'pointer'});cl.textContent='Mostrar "% OFF"';
    cr.appendChild(ck);cr.appendChild(cl);left.appendChild(cr);
    left.appendChild(lbl('Alineación del subtexto'));
    left.appendChild(row(
      (()=>{
        const w=mk('div');css(w,{display:'flex',gap:'3px'});
        [['left','←'],['center','↔'],['right','→']].forEach(([v,icon])=>{
          const b=mk('button');b.type='button';b.textContent=icon;
          b.className='alignbtn'+(( c().descSubAlign||'left')===v?' on':'');
          b.onclick=e=>{e.preventDefault();c().descSubAlign=v;setTimeout(reRender,0);};
          w.appendChild(b);
        });
        return w;
      })()
    ));
    left.appendChild(lbl('Fuente descuento'));
    left.appendChild(sinp([['Moranga','Moranga'],['CerebriSans','Cerebri Sans']],c().descFont,v=>c().descFont=v));
    left.appendChild(row(bBtn('descBold'),(()=>{const s=mk('span');css(s,{fontSize:'11px',color:'#6b7280'});s.textContent='Negrita';return s;})()));
    left.appendChild(rrw('Tamaño número',20,180,1,c().descNumSize,v=>c().descNumSize=v));
    left.appendChild(rrw('Tamaño subtexto',8,32,1,c().descSubSize,v=>c().descSubSize=v));
    left.appendChild(gr2(
      (()=>{const d=mk('div');d.appendChild(lbl('Color número'));d.appendChild(cinp(c().descNumColor,v=>c().descNumColor=v));return d;})(),
      (()=>{const d=mk('div');d.appendChild(lbl('Color subtexto'));d.appendChild(cinp(c().descSubColor,v=>c().descSubColor=v));return d;})()
    ));
  }
  if(c().mode==='promo'){
    left.appendChild(lbl('Texto de la promo'));
    const ta=mk('textarea');ta.value=c().promoText;ta.rows=3;ta.className='tinp';ta.style.resize='vertical';ta.placeholder='3 cuotas\nsin interés';
    ta.oninput=e=>{c().promoText=e.target.value;reBanner();};left.appendChild(ta);
    left.appendChild(lbl('Fuente promo'));
    left.appendChild(sinp([['Moranga','Moranga'],['CerebriSans','Cerebri Sans']],c().promoFont,v=>c().promoFont=v));
    left.appendChild(row(
      bBtn('promoBold'),
      (()=>{const s=mk('span');css(s,{fontSize:'11px',color:'#6b7280'});s.textContent='Negrita';return s;})(),
      (()=>{
        const w=mk('div');css(w,{display:'flex',gap:'3px',marginLeft:'auto'});
        [['left','←'],['center','↔'],['right','→']].forEach(([v,icon])=>{
          const b=mk('button');b.type='button';b.textContent=icon;
          b.className='alignbtn'+((c().promoAlign||'center')===v?' on':'');
          b.onclick=e=>{e.preventDefault();c().promoAlign=v;setTimeout(reRender,0);};
          w.appendChild(b);
        });
        return w;
      })()
    ));
    left.appendChild(rrw('Tamaño texto',12,90,1,c().promoSize,v=>c().promoSize=v));
    left.appendChild(lbl('Color texto'));left.appendChild(cinp(c().promoColor,v=>c().promoColor=v));
    left.appendChild(lbl('Color fondo'));
    left.appendChild(swRow(['#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#06b6d4'],c().promoBg,v=>c().promoBg=v));
    left.appendChild(cinp(c().promoBg,v=>c().promoBg=v));
  }

  // 3. CTA
  left.appendChild(divL());left.appendChild(sh('3','Botón CTA'));
  left.appendChild(tinp(c().ctaText,v=>c().ctaText=v));
  left.appendChild(lbl('Fuente botón'));
  left.appendChild(sinp([['Moranga','Moranga'],['CerebriSans','Cerebri Sans']],c().ctaFont,v=>c().ctaFont=v));
  left.appendChild(row(bBtn('ctaBold'),(()=>{const s=mk('span');css(s,{fontSize:'11px',color:'#6b7280'});s.textContent='Negrita';return s;})()));
  left.appendChild(rrw('Tamaño texto',8,36,1,c().ctaSize,v=>c().ctaSize=v));
  left.appendChild(gr2(
    (()=>{const d=mk('div');d.appendChild(lbl('Color botón'));
      d.appendChild(swRow(['#051130','#111827','#1e40af','#dc2626','#16a34a','#d97706','#7c3aed'],c().ctaColor,v=>c().ctaColor=v));
      d.appendChild(cinp(c().ctaColor,v=>c().ctaColor=v));return d;})(),
    (()=>{const d=mk('div');d.appendChild(lbl('Color texto botón'));
      d.appendChild(swRow(['#ffffff','#051130','#111827','#1e40af','#fbbf24','#f9fafb'],c().ctaTextColor||'#ffffff',v=>c().ctaTextColor=v));
      d.appendChild(cinp(c().ctaTextColor||'#ffffff',v=>c().ctaTextColor=v));return d;})()
  ));

  // 4. Estilo
  left.appendChild(divL());left.appendChild(sh('4','Estilo y Color'));
  const cg=mk('div');css(cg,{display:'grid',gridTemplateColumns:c().useGrad?'1fr 1fr':'1fr',gap:'8px',marginBottom:'8px'});
  const ca=mk('div');ca.appendChild(lbl('Color A'));
  ca.appendChild(swRow(['#0a1945','#1e3a8a','#111827','#064e3b','#7c2d12','#fff'],c().colorA,v=>c().colorA=v));
  ca.appendChild(cinpFull(c().colorA,v=>c().colorA=v));cg.appendChild(ca);
  if(c().useGrad){
    const cb2=mk('div');cb2.appendChild(lbl('Color B'));
    cb2.appendChild(swRow(['#0a1945','#1e3a8a','#111827','#064e3b','#7c2d12','#fff'],c().colorB,v=>c().colorB=v));
    cb2.appendChild(cinpFull(c().colorB,v=>c().colorB=v));cg.appendChild(cb2);
  }
  left.appendChild(cg);
  const gr=mk('div');css(gr,{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'});
  const gc=mk('input');gc.type='checkbox';gc.checked=c().useGrad;gc.style.accentColor='#2563eb';gc.style.cursor='pointer';
  gc.onchange=e=>{c().useGrad=e.target.checked;reRender();};
  const gl=mk('label');css(gl,{fontSize:'12px',fontWeight:'500',cursor:'pointer'});gl.textContent='Usar degradado';
  gr.appendChild(gc);gr.appendChild(gl);left.appendChild(gr);
  left.appendChild(gr2(
    (()=>{const d=mk('div');d.appendChild(lbl('Texto'));d.appendChild(sinp([['left','Izq.'],['right','Der.']],c().textSide,v=>{
        c().textSide=v;
        const pw=c().panelW||63;
        if(v==='right'){c().posX=Math.round((100-pw)/2);c().posY=50;}
        else{c().posX=Math.round(pw+(100-pw)/2);c().posY=50;}
        reRender();
      }));return d;})(),
    (()=>{const d=mk('div');d.appendChild(lbl('Corte'));d.appendChild(sinp([['diagonal-right','Diag. Der.'],['diagonal-left','Diag. Izq.'],['straight','Recto']],c().clipStyle,v=>{c().clipStyle=v;reFull();}));return d;})()
  ));
  left.appendChild(lbl('Ancho del panel de color (%)'));
  left.appendChild(rrwFull('Panel',20,85,1,c().panelW,v=>c().panelW=v));
  left.appendChild(lbl('Inclinación de la diagonal (%)'));
  left.appendChild(rrwFull('Diagonal',0,50,1,c().diagAngle!==undefined?c().diagAngle:20,v=>c().diagAngle=v));

  left.appendChild(lbl('Efecto borde'));
  left.appendChild(sinp([['none','Sin efecto'],['shadow','Sombra'],['glow','Brillo'],['solid-white','Línea Blanca']],c().edgeEffect,v=>{c().edgeEffect=v;reFull();}));

  // 5. Imagen
  left.appendChild(divL());left.appendChild(sh('5','Imagen y Encuadre'));
  left.appendChild(lbl('Lado de la imagen'));
  left.appendChild(tabBar([
    ['right','Imagen derecha'],
    ['left','Imagen izquierda']
  ],c().textSide,v=>{
    c().textSide=v;
    const pw=c().panelW||63;
    // Center image in the visible area on each side
    if(v==='right'){ c().posX=Math.round((100-pw)/2); c().posY=50; }
    else           { c().posX=Math.round(pw+(100-pw)/2); c().posY=50; }
    reRender();
  }));

  left.appendChild(lbl('Imagen de fondo'));
  const bf=mk('input');bf.type='file';bf.accept='image/*';css(bf,{width:'100%',fontSize:'12px',marginBottom:'12px',cursor:'pointer'});
  bf.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async ev=>{
      const compressed=await compressImage(ev.target.result);
      const kb=Math.round((compressed.length*0.75)/1024);
      if(kb>1950){alert('La imagen es muy grande. Por favor usá una imagen más pequeña.');return;}
      c().bgImg=compressed;
      bf.title='Imagen lista ('+kb+' KB)';
      reFull();
    };
    r.readAsDataURL(f);
  };
  left.appendChild(bf);
  const ab=mk('div');css(ab,{background:'#f8fafc',borderRadius:'10px',padding:'12px'});
  ab.appendChild(rrwFull('Zoom',0.1,3,0.05,c().zoom,v=>c().zoom=v));
  ab.appendChild(rrwFull('Posición H',-50,150,1,c().posX,v=>c().posX=v));
  ab.appendChild(rrwFull('Posición V',-50,150,1,c().posY,v=>c().posY=v));
  left.appendChild(ab);

  // 6. Logos
  left.appendChild(divL());left.appendChild(sh('6','Logos Partner'));
  // Template selector
  left.appendChild(lbl('Plantilla de logos'));
  left.appendChild(tabBar([['1','1 logo'],['2','2 logos'],['4','4 logos'],['6','6 logos']],String(c().logoCount||1),v=>{c().logoCount=+v;reRender();}));
  left.appendChild(rrw('Tamaño',30,180,1,c().logoSize,v=>c().logoSize=v));
  left.appendChild(rrw('Separación',0,40,1,c().logoGap||10,v=>c().logoGap=v));
  const ll=mk('div');css(ll,{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'8px'});
  const nLogos=c().logoCount||1;
  for(let i=0;i<nLogos;i++){
    const src2=c().logos[i]||null;
    const lr=mk('div');css(lr,{display:'flex',alignItems:'center',gap:'8px',background:'#f8fafc',borderRadius:'8px',padding:'7px 10px'});
    const ln=mk('span');css(ln,{fontSize:'11px',fontWeight:'600',color:'#6b7280',minWidth:'44px'});ln.textContent='Logo '+(i+1);
    const lf=mk('input');lf.type='file';lf.accept='image/*';lf.style.cssText='flex:1;font-size:11px;cursor:pointer';
    lf.onchange=(ii=>e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{c().logos[ii]=ev.target.result;reRender();};
      r.readAsDataURL(f);
    })(i);
    lr.appendChild(ln);lr.appendChild(lf);
    if(src2){
      const pv=mk('div');css(pv,{width:'26px',height:'26px',borderRadius:'5px',overflow:'hidden',background:'#fff',border:'1px solid #e5e7eb',flexShrink:'0'});
      const pi=mk('img');pi.src=src2;css(pi,{width:'100%',height:'100%',objectFit:'contain'});pv.appendChild(pi);lr.appendChild(pv);
    }
    const rb=mk('button');rb.textContent='×';rb.type='button';rb.title='Limpiar';
    css(rb,{width:'22px',height:'22px',borderRadius:'50%',background:'#fee2e2',color:'#dc2626',border:'none',cursor:'pointer',fontSize:'14px',lineHeight:'1',fontWeight:'700',flexShrink:'0'});
    rb.onclick=(ii=>e=>{e.preventDefault();e.stopPropagation();c().logos[ii]=null;setTimeout(reRender,0);})(i);
    lr.appendChild(rb);ll.appendChild(lr);
  }
  left.appendChild(ll);

  return left;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const app=$('app');app.innerHTML='';
  const root=mk('div');css(root,{maxWidth:'1220px',margin:'0 auto'});
  const hdr=mk('div');css(hdr,{marginBottom:'14px',paddingBottom:'12px',borderBottom:'1px solid #e2e8f0'});
  const h1=mk('h1');css(h1,{fontSize:'21px',fontWeight:'800',color:'#111',letterSpacing:'-0.02em'});h1.textContent='Generador de Banners Bonda';
  const sub=mk('p');css(sub,{fontSize:'12px',color:'#94a3b8',marginTop:'3px'});sub.textContent='Arrastrá los elementos · Doble clic = tamaño · Segmentos de color por línea';
  hdr.appendChild(h1);hdr.appendChild(sub);root.appendChild(hdr);
  const grid=mk('div');css(grid,{display:'grid',gridTemplateColumns:'310px 1fr',gap:'18px',alignItems:'start'});root.appendChild(grid);
  grid.appendChild(buildLeft());
  const right=mk('div');
  const tb=mk('div');css(tb,{background:'#fff',borderRadius:'14px',padding:'12px 16px',border:'1px solid #e2e8f0',boxShadow:'0 1px 4px rgba(0,0,0,.06)',marginBottom:'14px',display:'flex',alignItems:'center',justifyContent:'space-between'});
  const vb=mk('div');css(vb,{display:'flex',background:'#f3f4f6',borderRadius:'10px',padding:'3px'});
  ['desktop','mobile','both'].forEach(v=>{
    const b=mk('button');b.type='button';b.className='viewbtn'+(S.viewMode===v?' on':'');
    b.textContent=v==='both'?'Ambos':v[0].toUpperCase()+v.slice(1);
    b.onclick=()=>{S.viewMode=v;if(v!=='both')S.editFmt=v;reRender();};
    vb.appendChild(b);
  });
  const ht=mk('p');css(ht,{fontSize:'11px',color:'#94a3b8'});ht.textContent='Arrastrá · Doble clic = tamaño';
  tb.appendChild(vb);tb.appendChild(ht);right.appendChild(tb);
  const bl=mk('div');css(bl,{display:'flex',flexDirection:'column',gap:'20px'});right.appendChild(bl);
  const fmts=S.viewMode==='both'?['desktop','mobile']:[S.viewMode];
  fmts.forEach(fmt=>{
    const wrap=mk('div');
    const br=mk('div');css(br,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px',padding:'0 4px'});
    const blab=mk('span');css(blab,{fontSize:'10px',fontWeight:'700',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.08em'});
    blab.textContent=fmt==='mobile'?'Mobile: 984×450 px':'Desktop: 1000×300 px';
    const db=mk('button');db.id='dl-'+fmt;db.type='button';db.textContent='⬇ Descargar PNG';
    css(db,{background:'#16a34a',color:'#fff',border:'none',borderRadius:'10px',padding:'8px 18px',fontSize:'12px',fontWeight:'700',cursor:'pointer'});
    db.onclick=()=>dlBanner(fmt);
    br.appendChild(blab);br.appendChild(db);wrap.appendChild(br);
    const shell=mk('div');css(shell,{borderRadius:'14px',boxShadow:'0 4px 24px rgba(0,0,0,.12)',border:'1px solid #e2e8f0',position:'relative'});
    shell.appendChild(buildBanner(fmt));
    wrap.appendChild(shell);bl.appendChild(wrap);
  });
  grid.appendChild(right);app.appendChild(root);
}

window.addEventListener('DOMContentLoaded',async()=>{await loadFonts();render();});
</script>
</body>
</html>
